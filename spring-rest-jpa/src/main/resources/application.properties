
# Project Name
spring.application.name=spring-rest-jpa

# 1. H2 Console Settings (So you can visit localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 2. Database Connection (Standard H2 configuration)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 3. JPA/Hibernate Settings
# Shows the SQL in your Eclipse console (Great for learning!)
spring.jpa.show-sql=true
# Automatically creates/updates the database tables based on your @Entity
spring.jpa.hibernate.ddl-auto=update

spring.jpa.defer-datasource-initialization=true